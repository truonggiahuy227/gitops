
nameOverride: ""
fullnameOverride: "devops-challenge-truong-gia-huy"

image:
  registry: "docker.io"
  repository: "tghuy2/devops-challenge-truong-gia-huy-develop"
  tag: "ce97dae"
  pullPolicy: IfNotPresent

kind: Deployment

revisionHistoryLimit: 10

replicaCount: 3

startupProbe:
  enabled: false

livenessProbe:
  enabled: false

readinessProbe:
  enabled: false

extraEnvVars:
- name: COMPlus_EnableDiagnostics
  value: "0"
- name: ASPNETCORE_HTTP_PORTS
  value: "5000"
- name: ASPNETCORE_URLS
  value: "http://+:5000"
- name: DOTNET_RUNNING_IN_CONTAINER
  value: "true"

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 1000m
    memory: 2Gi

podSecurityContext:
  enabled: true
  fsGroupChangePolicy: Always
  sysctls: []
  supplementalGroups: []
  fsGroup: 1001

containerSecurityContext:
  enabled: true
  seLinuxOptions: {}
  runAsUser: 1001
  runAsGroup: 1001
  runAsNonRoot: true
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  seccompProfile:
    type: RuntimeDefault
  capabilities:
    drop: ["ALL"]

updateStrategy:
  type: RollingUpdate

podLabels:
  commit-hash: "ce97dae" 

affinity: 
  podAntiAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
    - labelSelector:
        matchExpressions:
        - key: commit-hash
          operator: In
          values:
          - "ce97dae"
      topologyKey: kubernetes.io/hostname

nodeSelector: {}
tolerations: []

containerPorts:
  - name: http
    containerPort: 5000
    protocol: TCP

service:
  type: ClusterIP
  ports:
    - name: http
      port: 5000
      targetPort: http
      protocol: TCP
  externalTrafficPolicy: Cluster
  internalTrafficPolicy: Cluster
  sessionAffinity: None

terminationGracePeriodSeconds: 30

serviceAccount:
  create: false

autoscaling:
  enabled: false
  minReplicas: 3
  maxReplicas: 5
  targetCPU: ""
  targetMemory: ""

pdb:
  create: true
  minAvailable: "3"
  maxUnavailable: ""

ingress:
  enabled: true
  className: "nginx"
  annotations: {}
  hosts:
    - host: ""
      paths:
        - path: /weatherforecast
          pathType: Prefix
  tls: []


networkPolicy:
  enabled: false